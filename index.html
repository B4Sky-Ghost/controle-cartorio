<body>

  <div class="top-bg"></div>
     <div class="container">
     
  <h1>📁 Controle de Documentos</h1>

  <!-- ID -->
  <input id="id" placeholder="Nº do documento">

  <!-- TIPO (AGORA SELECT) -->
  <select id="tipo">
    <option value="">Selecione o tipo</option>

    <option>Abertura de matrícula</option>
    <option>Averbação</option>
    <option>Exame de cálculo</option>
    <option>Escritura</option>
    <option>Notificação</option>
    <option>Processo devolvido (Termo de Devolução)</option>
    <option>Processo para devolver</option>
    <option>Registro</option>
    <option>Registro de cédula</option>
    <option>Retificação Administrativa</option>
    <option>Restauração de matrícula</option>
    <option>Outros</option>

  </select>

  <!-- DESCRIÇÃO -->
  <input id="descricao" placeholder="Descrição">

  <!-- LOCALIZAÇÃO -->
  <select id="local">
    <option value="">Localização</option>
    <option>Arquivo</option>
    <option>Gaveta</option>
    <option>Adelar</option>
    <option>Ana</option>
    <option>Benizania</option>
    <option>Rafaela</option>
    <option>Rafael</option>
    <option>Rayanny</option>
    <option>Wanderson</option>
  </select>

  <!-- BOTÃO -->
  <button onclick="registrar()">Registrar</button>
  
  <h2>📜 Lista</h2>

  <div style="margin-bottom: 10px;">
    <input id="busca" placeholder="🔍 Buscar por ID..." oninput="filtrarLista()">
  </div>

  <ul id="lista"></ul>
</div>
  <script type="module" src="./main.js"></script>
</body>
</html>
